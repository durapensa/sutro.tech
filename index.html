<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sutro Tech — concierge technologist</title>
<meta name="description" content="Sutro Tech — WiFi · HiFi · Ai for home and business. David Hart, concierge technologist. San Francisco.">
<meta name="theme-color" content="#0a0a0a">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32' fill='%23ffffff'><rect x='9' y='3' width='1' height='9'/><rect x='15.5' y='1' width='1' height='11'/><rect x='22' y='3' width='1' height='9'/><rect x='7' y='11.5' width='18' height='1.2'/><polygon points='11,12.7 21,12.7 27,30 5,30'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;900&family=Bellota:ital,wght@0,400;1,400&family=Jura:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #ffffff;
    --grid: rgba(255,255,255,0.022);   /* subtle grid line color */
    --grid-size: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Montserrat', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  /* ---- SUBTLE GRID ----------------------------------------------------- */
  /* To remove the grid: delete class="grid" on <body>, or delete this block. */
  body.grid {
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: var(--grid-size) var(--grid-size);
  }
  /* --------------------------------------------------------------------- */

  main {
    min-height: 100%;
    display: grid;
    place-items: center;
    padding: 3rem 1.5rem;
  }

  .card {
    width: 100%;
    max-width: 720px;
    text-align: center;
  }

  .title {
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: clamp(2.6rem, 8vw, 4.5rem);
    letter-spacing: -0.005em;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4em;
  }
  .title .wave {
    font-weight: 400;
    font-size: 0.7em;
    opacity: 0.95;
  }

  .domain {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: clamp(1.15rem, 2.6vw, 1.5rem);
    margin-top: 1.4rem;
    letter-spacing: 0.01em;
  }

  .services {
    /* Eurofurence is not on Google Fonts; Jura is the fallback. */
    font-family: 'eurofurence', 'Jura', 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: clamp(1.25rem, 2.9vw, 1.65rem);
    letter-spacing: 0.04em;
    margin-top: 1.1rem;
  }

  .tagline,
  .role {
    font-family: 'Bellota', cursive;
    font-weight: 400;
    font-size: clamp(1.15rem, 2.6vw, 1.45rem);
  }
  .tagline { font-style: italic; margin-top: 1.1rem; }
  .role    { margin-top: 1.1rem; }
  .role .star { display: inline-block; padding: 0 0.5em; opacity: 0.95; }

  .sep {
    margin-top: 1.3rem;
    font-size: 1.7rem;
    line-height: 1;
    opacity: 0.85;
  }

  .footer {
    margin-top: 3rem;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 1.5rem;
    flex-wrap: wrap;
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    font-size: clamp(1.4rem, 4.2vw, 2.1rem);
    letter-spacing: -0.005em;
  }
  .footer a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color .15s ease;
  }
  .footer a:hover,
  .footer a:focus-visible { border-bottom-color: rgba(255,255,255,0.55); }

  @media (max-width: 480px) {
    .footer { justify-content: center; flex-direction: column; gap: 0.6rem; }
  }

  @media (prefers-reduced-motion: no-preference) {
    .card { animation: rise .6s ease-out both; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }
  }
</style>
</head>
<body class="grid">
  <main>
    <article class="card">
      <h1 class="title">
        <span class="wave" aria-hidden="true">〰</span>Sutro Tech<span class="wave" aria-hidden="true">〰</span>
      </h1>
      <p class="domain">sutro.tech</p>
      <p class="services">WiFi · HiFi · Ai</p>
      <p class="tagline">home and business</p>
      <p class="sep" aria-hidden="true">⌇</p>
      <p class="role"><span class="star" aria-hidden="true">✧</span>concierge technologist<span class="star" aria-hidden="true">✧</span></p>
      <div class="footer">
        <span>David Hart</span>
        <a href="tel:+14153554362" aria-label="Call David Hart at 415 355 4362">(415) 355-4362</a>
      </div>
    </article>
  </main>
</body>
</html>
