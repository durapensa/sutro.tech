<style>
  /* ---- SELF-HOSTED FONTS (subset to glyphs used) ---------------------- */
  @font-face {
    font-family: 'Montserrat';
    font-weight: 900;
    font-style: normal;
    font-display: swap;
    src: url('fonts/montserrat-black.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Montserrat';
    font-weight: 300;
    font-style: normal;
    font-display: swap;
    src: url('fonts/montserrat-light.woff2') format('woff2');
  }
  @font-face {
    font-family: 'eurofurence';
    font-weight: 500;
    font-style: normal;
    font-display: swap;
    src: url('fonts/eurofurence.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Bellota';
    font-weight: 400;
    font-style: normal;
    font-display: swap;
    src: url('fonts/bellota-regular.woff2') format('woff2');
  }
  @font-face {
    font-family: 'Bellota';
    font-weight: 400;
    font-style: italic;
    font-display: swap;
    src: url('fonts/bellota-italic.woff2') format('woff2');
  }

  :root {
    --bg: #0a0a0a;
    --fg: #ffffff;
    --grid: rgba(255,255,255,0.06);    /* grid line color */
    --grid-size: 24px;                 /* grid cell size — graph-paper feel */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'Montserrat', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    display: flex;
    flex-direction: column;
  }

  /* ---- SUBTLE GRID ----------------------------------------------------- */
  /* To remove the grid: delete class="grid" on <body>, or delete this block. */
  body.grid {
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: var(--grid-size) var(--grid-size);
  }
  /* --------------------------------------------------------------------- */

  main {
    flex: 1;
    display: grid;
    place-items: center;
    padding: 3rem clamp(1rem, 4vw, 1.5rem);
  }

  .colophon {
    text-align: center;
    padding: 1.5rem clamp(1rem, 4vw, 1.5rem);
    font-family: 'Bellota', cursive;
    font-style: italic;
    font-size: clamp(0.78rem, 1.9vw, 0.9rem);
    opacity: 0.55;
    letter-spacing: 0.01em;
    transition: opacity .2s ease;
  }
  .colophon:hover,
  .colophon:focus-within { opacity: 0.9; }
  .colophon a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color .15s ease;
  }
  .colophon a:hover,
  .colophon a:focus-visible { border-bottom-color: currentColor; }

  .card {
    width: 100%;
    max-width: 720px;
    text-align: center;
  }

  /* Every line on the card is meant to stay on a single line. */
  .card > * { white-space: nowrap; }

  .title {
    font-family: 'Montserrat', system-ui, sans-serif;
    font-weight: 900;
    font-size: clamp(1.7rem, 8.5vw, 4.5rem);
    letter-spacing: -0.005em;
    line-height: 1;
  }

  .domain {
    font-family: 'Montserrat', system-ui, sans-serif;
    font-weight: 300;
    font-size: clamp(1rem, 2.7vw, 1.5rem);
    margin-top: 1.4rem;
    letter-spacing: 0.01em;
  }

  .services {
    font-family: 'eurofurence', 'Montserrat', system-ui, sans-serif;
    font-weight: 500;
    font-size: clamp(1.05rem, 3vw, 1.65rem);
    letter-spacing: 0.04em;
    margin-top: 1.1rem;
  }

  .tagline,
  .role {
    font-family: 'Bellota', cursive;
    font-weight: 400;
    font-size: clamp(1rem, 2.7vw, 1.45rem);
  }
  .tagline { font-style: italic; margin-top: 1.1rem; }
  .role    { margin-top: 1.1rem; }
  .role .star { display: inline-block; padding: 0 0.5em; opacity: 0.95; }

  .sep {
    margin-top: 1.3rem;
    font-size: 1.7rem;
    line-height: 1;
    opacity: 0.85;
  }

  .footer {
    margin-top: 3rem;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 0.6em;
    font-family: 'Montserrat', system-ui, sans-serif;
    font-weight: 900;
    font-size: clamp(1rem, 4.8vw, 2.1rem);
    letter-spacing: -0.005em;
  }
  .footer a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color .15s ease;
  }
  .footer a:hover,
  .footer a:focus-visible { border-bottom-color: rgba(255,255,255,0.55); }

  @media (prefers-reduced-motion: no-preference) {
    .card { animation: rise .6s ease-out both; }
    @keyframes rise {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: none; }
    }
  }
</style>
